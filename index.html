<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>El Piso Asturiano</title>
<!--
  ============================================================
  EL PISO ASTURIANO — living spec / v0.25
  ============================================================
  Loop: match-3 wins + SRS reviews earn estrellas -> buy furniture
  -> each object learned in Spanish (image-first) -> room = memory palace.
  SRS (Leitner 1-5): 10min/1d/3d/7d/21d. Reviews also earn hammers.
  v0.7: FX animation layer, chrome-less tiles, rocket finale,
  goal-seeking planes, droppers (empanada), orbayu jelly, cocina room.
  See SPEC.md for the full design record.
  ============================================================
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --pizarra:#2E3A44; --verde:#3E7C4F; --sidra:#E8A93C; --crema:#F5F0E4;
    --teja:#C0563B; --azul:#3E6E8E; --linea:#D8CFBB;
    --sombra:0 2px 10px rgba(46,58,68,.12);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:'Nunito',system-ui,sans-serif; color:var(--pizarra); background:var(--crema);
    background-image:linear-gradient(180deg,#EDF2EC 0%,var(--crema) 240px);
    min-height:100vh; padding-bottom:84px;
  }
  header{display:flex; align-items:baseline; justify-content:space-between; padding:14px 18px 6px; max-width:820px; margin:0 auto;}
  h1{font-family:'Fraunces',serif; font-weight:800; font-size:26px; margin:0;}
  h1 small{font-family:'Nunito'; font-weight:700; font-size:12px; color:#7d8a7f; display:block;}
  .hud{display:flex; gap:10px; align-items:center;}
  .pill{background:#fff; border:1px solid var(--linea); border-radius:999px; padding:5px 12px; font-weight:800; font-size:15px; box-shadow:var(--sombra); display:flex; gap:5px; align-items:center;}
  .pill .star{color:var(--sidra);}
  .due-badge{background:var(--teja); color:#fff; border:none;}
  main{max-width:820px; margin:0 auto; padding:6px 14px;}
  .tab{display:none;}
  .tab.active{display:block; animation:fade .25s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1;}}
  @media (prefers-reduced-motion: reduce){ *{animation:none!important; transition:none!important;} }

  nav{position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--linea); display:flex; justify-content:center; gap:6px; padding:8px 10px calc(8px + env(safe-area-inset-bottom)); z-index:40;}
  nav button{font-family:'Nunito'; font-weight:800; font-size:14px; border:none; background:none; color:#8a948d; padding:10px 13px; border-radius:14px; cursor:pointer; position:relative;}
  nav button.active{background:var(--verde); color:#fff;}
  nav button .nbadge{position:absolute; top:2px; right:8px; background:var(--teja); color:#fff; border-radius:999px; font-size:11px; padding:1px 6px; font-weight:800;}

  /* ---------- CASA ---------- */
  .room-tabs{display:flex; gap:8px; margin:0 0 10px;}
  .room-tabs button{font-family:'Nunito'; font-weight:800; font-size:14px; border:1px solid var(--linea); background:#fff; border-radius:999px; padding:7px 16px; cursor:pointer; box-shadow:var(--sombra); color:#7d8a7f;}
  .room-tabs button.active{background:var(--verde); color:#fff; border-color:var(--verde);}
  .room-wrap{background:#fff; border:1px solid var(--linea); border-radius:18px; padding:10px; box-shadow:var(--sombra);}
  .room-wrap svg{width:100%; height:auto; display:block; border-radius:12px;}
  .slot-empty{opacity:.35; cursor:default;}
  .slot-item{cursor:pointer;}
  .room-note{font-size:13px; color:#7d8a7f; margin:8px 4px 2px; font-weight:700;}
  .shop{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin-top:14px;}
  .shop-card{background:#fff; border:1px solid var(--linea); border-radius:14px; padding:12px; text-align:center; box-shadow:var(--sombra);}
  .shop-card .em{font-size:38px; line-height:1.1;}
  .shop-card .nm{font-weight:800; font-size:15px; margin:4px 0 8px;}
  .shop-card button{font-family:'Nunito'; font-weight:800; font-size:14px; border:none; border-radius:10px; padding:8px 14px; cursor:pointer; background:var(--sidra); color:#4a3608; width:100%;}
  .shop-card button:disabled{background:#eee7d6; color:#b3a888; cursor:default;}
  .shop-card.owned{opacity:.55;}
  .shop-card.owned button{background:var(--verde); color:#fff;}
  .g-el,.g-los{color:var(--azul);} .g-la,.g-las{color:var(--teja);}
  .tasks{background:#fff; border:1px solid var(--linea); border-radius:16px; padding:12px 14px; margin-top:14px; box-shadow:var(--sombra);}
  .tasks-h{font-family:'Fraunces',serif; font-weight:800; font-size:17px; margin-bottom:4px;}
  .task{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:8px 4px; border-top:1px dashed var(--linea); font-weight:700; font-size:14px;}
  .task.locked{color:#b3b8ad;}
  .task.done{color:var(--verde);}
  .task .cen{display:block; font-size:11px; color:#9aa49c; font-weight:700;}
  .task button{font-family:'Nunito'; font-weight:800; border:none; border-radius:10px; padding:6px 12px; cursor:pointer; background:var(--sidra); color:#4a3608;}
  .task button:disabled{background:#eee7d6; color:#b3a888; cursor:default;}
  .task .tk-audio{background:#fff; border:1px solid var(--linea);}
  .cooper{background:#fff; border:1px solid var(--linea); border-radius:14px; padding:8px 12px; font-weight:700; font-size:14px; margin:10px 0; text-align:left;}
  .cooper .cen{font-size:11px; color:#9aa49c;}

  /* ---------- JUEGO ---------- */
  .game-top{display:flex; justify-content:space-between; align-items:center; margin:4px 2px 8px; font-weight:800;}
  .game-top .lvl{font-family:'Fraunces',serif; font-size:20px;}
  .goals{display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:0 0 10px;}
  .goal-chip{background:#fff; border:1px solid var(--linea); border-radius:999px; padding:4px 10px; font-weight:800; font-size:14px; box-shadow:var(--sombra); display:inline-flex; gap:5px; align-items:center;}
  .goal-chip.done{background:var(--verde); color:#fff; border-color:var(--verde);}
  .pill.hammer{cursor:pointer; border:1px solid var(--linea); font-family:'Nunito'; font-size:15px;}
  .pill.hammer.armed{background:var(--sidra);}
  .pill.hammer:disabled{opacity:.45; cursor:default;}
  #board{
    position:relative; display:grid; grid-template-columns:repeat(9,1fr); gap:3px;
    background:var(--pizarra); padding:10px; border-radius:16px; box-shadow:var(--sombra);
    touch-action:manipulation; user-select:none; overflow:hidden;
  }
  .cell{
    position:relative; aspect-ratio:1; background:transparent; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(18px,4.6vw,31px); cursor:pointer;
    transition:transform .12s ease, background .12s ease;
  }
  .cell.hole,.cell.static{cursor:default;}
  .cell.sel{background:rgba(232,169,60,.32); transform:scale(1.15);}
  .cell.pop{animation:pop .22s ease forwards;}
  @keyframes pop{to{transform:scale(.1); opacity:0;}}
  .cell.hint{animation:hintPulse 1s ease infinite;}
  @keyframes hintPulse{0%,100%{background:transparent; transform:scale(1);}50%{background:rgba(232,169,60,.35); transform:scale(1.12);}}
  .cell.spc{filter:drop-shadow(0 0 6px rgba(232,169,60,.95));}
  .cell.dmg{animation:shake .25s ease;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-3px);}75%{transform:translateX(3px);}}
  .ob-chain{position:absolute; top:0; right:1px; font-size:11px; filter:drop-shadow(0 1px 1px rgba(0,0,0,.6));}
  .ob-hp{position:absolute; bottom:0; right:2px; font-size:10px; font-weight:800; color:#fff; background:rgba(0,0,0,.5); border-radius:6px; padding:0 4px;}
  .jelly{position:absolute; inset:6%; border-radius:26%; background:rgba(126,158,178,.42); box-shadow:inset 0 0 8px rgba(126,158,178,.6); pointer-events:none;}
  .legend{display:flex; flex-wrap:wrap; gap:6px 14px; justify-content:center; margin-top:10px; font-size:13px; font-weight:700; color:#5c6a63;}
  .float-word{position:absolute; font-family:'Fraunces',serif; font-weight:800; color:#fff; text-shadow:0 2px 6px rgba(0,0,0,.4); font-size:20px; pointer-events:none; animation:rise .9s ease forwards; z-index:5;}
  @keyframes rise{from{opacity:1; transform:translateY(0);} to{opacity:0; transform:translateY(-40px);}}
  .praise{position:absolute; left:50%; top:45%; font-family:'Fraunces',serif; font-weight:800; font-size:36px; color:#fff; text-shadow:0 3px 12px rgba(0,0,0,.55); animation:praiseAnim .95s ease forwards; pointer-events:none; z-index:6;}
  @keyframes praiseAnim{0%{opacity:0; transform:translate(-50%,-50%) scale(.6);}30%{opacity:1; transform:translate(-50%,-50%) scale(1.15);}100%{opacity:0; transform:translate(-50%,-50%) scale(1);}}

  /* ---------- FX layer (special-piece animations) ---------- */
  .fx{position:absolute; pointer-events:none; z-index:8; transform:translate(-50%,-50%); will-change:transform;}
  .fx-rocket{font-size:26px; transition:transform .38s linear; filter:drop-shadow(0 0 6px rgba(255,220,120,.9));}
  .fx-plane{font-size:26px; transition:transform .5s ease-in; filter:drop-shadow(0 0 6px rgba(255,255,255,.8));}
  .fx-boom{font-size:30px; animation:boomA .34s ease-out forwards;}
  @keyframes boomA{0%{transform:translate(-50%,-50%) scale(.3); opacity:1;}70%{opacity:1;}100%{transform:translate(-50%,-50%) scale(var(--boom-scale,2.4)); opacity:0;}}
  .fx-ring{width:20px; height:20px; border:3px solid var(--sidra); border-radius:50%; animation:ringA .5s ease-out forwards;}
  @keyframes ringA{0%{transform:translate(-50%,-50%) scale(.4); opacity:1;}100%{transform:translate(-50%,-50%) scale(var(--ring-scale,14)); opacity:0;}}
  .fx-laser{font-size:28px; animation:laserA .45s ease-out forwards;}
  @keyframes laserA{0%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.8);}100%{transform:translate(-50%,-50%) scale(.2); opacity:0;}}

  /* ---------- EXAMEN (drill) ---------- */
  .drill-panel{background:#fff; border:1px solid var(--linea); border-radius:16px; padding:14px; margin-top:14px; box-shadow:var(--sombra); text-align:center;}
  .drill-panel h3{font-family:'Fraunces',serif; font-weight:800; margin:0 0 4px; font-size:18px;}
  .drill-warn{font-size:12px; font-weight:800; color:#a06a1f; background:#FBF3E1; border:1px solid #EAD9B0; border-radius:10px; padding:6px 10px; margin:8px 0;}
  .drill-q{font-weight:800; color:#7d8a7f; margin:8px 0 12px;}
  .btn-ear{font-size:44px; background:#fff; border:1px solid var(--linea); border-radius:50%; width:84px; height:84px; cursor:pointer; box-shadow:var(--sombra); margin:4px auto 14px; display:block;}
  .opts{display:grid; grid-template-columns:1fr 1fr; gap:10px; max-width:340px; margin:0 auto;}
  .opt{font-size:42px; padding:16px 0; background:#FBF8F0; border:2px solid var(--linea); border-radius:16px; cursor:pointer; transition:transform .1s ease;}
  .opt:active{transform:scale(.96);}
  .opt.right{background:#E4F2E7; border-color:var(--verde);}
  .opt.wrong{background:#F8E5DF; border-color:var(--teja); animation:shake .25s ease;}
  .rot-svg{width:100%; height:auto; aspect-ratio:1/1; display:block; margin:0 auto; user-select:none; -webkit-tap-highlight-color:transparent;}
  .rot-exit{cursor:pointer; touch-action:manipulation; -webkit-tap-highlight-color:transparent;}
  .rot-exit .hit{fill:#FBF8F0; stroke:#9aa69a; stroke-width:3; transition:fill .15s ease, stroke .15s ease;}
  .rot-exit .lbl{font-family:'Fraunces',serif; font-size:26px; font-weight:800; fill:#2b2f2b; pointer-events:none; text-anchor:middle; dominant-baseline:central;}
  .rot-exit:active .hit{opacity:.7;}
  .rot-exit.right .hit{fill:#E4F2E7; stroke:var(--verde); stroke-width:4;}
  .rot-exit.wrong .hit{fill:#F8E5DF; stroke:var(--teja); stroke-width:4; animation:shake .25s ease;}
  .dir-svg{width:100%; height:auto; aspect-ratio:1/1; display:block; margin:0 auto; user-select:none; -webkit-tap-highlight-color:transparent;}
  .dir-exit{cursor:pointer; touch-action:manipulation; -webkit-tap-highlight-color:transparent;}
  .dir-exit .hit{fill:#FBF8F0; stroke:#9aa69a; stroke-width:3; transition:fill .15s ease, stroke .15s ease;}
  .dir-exit .lbl{font-size:34px; pointer-events:none; text-anchor:middle; dominant-baseline:central;}
  .dir-exit:active .hit{opacity:.7;}
  .dir-exit.right .hit{fill:#E4F2E7; stroke:var(--verde); stroke-width:4;}
  .dir-exit.wrong .hit{fill:#F8E5DF; stroke:var(--teja); stroke-width:4; animation:shake .25s ease;}
  .drill-timer{display:inline-block; font-family:'Fraunces',serif; font-weight:800; font-size:16px; padding:3px 10px; border-radius:999px; background:#E4F2E7; color:var(--verde); margin-left:8px; min-width:42px; text-align:center;}
  .drill-timer.warn{background:#FDEBCF; color:#8a5a0c;}
  .drill-timer.crit{background:#F8E5DF; color:var(--teja); animation:shake .3s ease;}
  .drill-mode-toggle{display:inline-block; font-weight:800; font-size:13px; padding:6px 14px; border-radius:999px; border:1.5px solid var(--linea); background:#FBF8F0; color:#5c6a63; cursor:pointer; transition:background .15s ease, color .15s ease, border-color .15s ease;}
  .drill-mode-toggle.on{background:var(--verde); color:#fff; border-color:var(--verde);}
  .drill-mode-toggle-row{margin:6px 0 10px; text-align:center;}
  .drill-reveal{margin-top:12px; font-weight:800;}
  .drill-reveal .es{font-family:'Fraunces',serif; font-size:20px;}
  .drill-reveal .en{font-size:12px; color:#9aa49c;}

  /* ---------- PROGRESO ---------- */
  .stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px;}
  .stat{background:#fff; border:1px solid var(--linea); border-radius:14px; padding:14px; text-align:center; box-shadow:var(--sombra);}
  .stat .n{font-family:'Fraunces',serif; font-weight:800; font-size:30px;}
  .stat .l{font-size:12px; font-weight:800; color:#7d8a7f;}
  .stat-panel{background:#fff; border:1px solid var(--linea); border-radius:16px; padding:14px; margin-top:12px; box-shadow:var(--sombra);}
  .stat-panel h3{font-family:'Fraunces',serif; font-weight:800; margin:0 0 10px; font-size:17px;}
  .sbar{display:flex; align-items:center; gap:8px; margin:6px 0; font-size:13px; font-weight:800;}
  .sbar .lab{width:110px; color:#5c6a63;}
  .sbar .bar{flex:1; background:#F0EBDD; border-radius:99px; height:16px; overflow:hidden;}
  .sbar .bar i{display:block; height:100%; background:var(--verde); border-radius:99px;}
  .sbar .val{width:26px; text-align:right;}

  /* ---------- REPASO ---------- */
  .rev-empty{background:#fff; border:1px dashed var(--linea); border-radius:16px; padding:34px 20px; text-align:center; color:#7d8a7f; font-weight:700;}
  .card{background:#fff; border:1px solid var(--linea); border-radius:20px; padding:28px 20px 22px; text-align:center; box-shadow:var(--sombra); max-width:440px; margin:0 auto;}
  .card .em{font-size:86px; line-height:1.1;}
  .card .q{font-weight:800; color:#7d8a7f; margin-top:10px;}
  .card .word{font-family:'Fraunces',serif; font-weight:800; font-size:34px; margin:10px 0 2px;}
  .card .en{font-size:13px; color:#9aa49c; font-weight:700;}
  .card .row{display:flex; gap:10px; justify-content:center; margin-top:18px;}
  .btn{font-family:'Nunito'; font-weight:800; font-size:16px; border:none; border-radius:12px; padding:12px 22px; cursor:pointer; box-shadow:var(--sombra);}
  .btn-show{background:var(--pizarra); color:#fff; width:70%;}
  .btn-otra{background:#fff; border:2px solid var(--teja); color:var(--teja);}
  .btn-bien{background:var(--verde); color:#fff; padding:12px 34px;}
  .btn-audio{background:#fff; border:1px solid var(--linea); font-size:20px; padding:8px 14px;}
  .rev-progress{text-align:center; font-weight:800; color:#7d8a7f; margin:10px 0 14px;}

  /* ---------- MODALES ---------- */
  .overlay{position:fixed; inset:0; background:rgba(46,58,68,.55); display:none; align-items:center; justify-content:center; z-index:60; padding:20px;}
  .overlay.open{display:flex;}
  .modal{background:var(--crema); border-radius:22px; padding:26px 22px; max-width:400px; width:100%; text-align:center; box-shadow:0 12px 40px rgba(0,0,0,.25);}
  .modal h2{font-family:'Fraunces',serif; font-weight:800; margin:0 0 6px; font-size:24px;}
  .modal p{margin:6px 0 16px; font-weight:700; color:#5c6a63;}
  .modal .em{font-size:74px;}
  footer{max-width:820px; margin:18px auto 0; padding:0 18px; font-size:12px; color:#a5ad9e; font-weight:700; display:flex; justify-content:space-between;}
  footer button{border:none; background:none; color:#a5ad9e; font-weight:800; cursor:pointer; font-size:12px; text-decoration:underline;}
</style>
</head>
<body>

<header>
  <h1>El Piso Asturiano<small>Amuebla tu casa, palabra a palabra</small></h1>
  <div class="hud">
    <div class="pill"><span class="star">★</span><span id="hud-stars">0</span></div>
    <div class="pill due-badge" id="hud-due" style="display:none">📖 <span id="hud-due-n">0</span></div>
    <div class="pill" id="btn-sound" style="cursor:pointer" title="sonido">🔊</div>
  </div>
</header>

<main>
  <!-- ================= CASA ================= -->
  <section id="tab-casa" class="tab active">
    <div class="room-tabs" id="room-tabs"></div>
    <div class="room-wrap">
      <svg id="room" viewBox="0 0 780 400" xmlns="http://www.w3.org/2000/svg" aria-label="La casa">
        <g id="room-bg"></g>
        <g id="room-items"></g>
        <g id="room-bubble" style="display:none">
          <rect id="rb-rect" rx="10" fill="#2E3A44"/>
          <text id="rb-text" fill="#fff" font-size="20" font-weight="bold" font-family="Nunito, sans-serif"></text>
        </g>
      </svg>
    </div>
    <p class="room-note">Toca un objeto para oír su nombre · <span style="color:var(--azul)">el</span> / <span style="color:var(--teja)">la</span></p>
    <div id="drill"></div>
    <div class="tasks" id="tasks"></div>
    <div class="shop" id="shop"></div>
  </section>

  <!-- ================= JUEGO ================= -->
  <section id="tab-juego" class="tab">
    <div class="game-top">
      <span class="lvl">Nivel <span id="g-level">1</span></span>
      <span style="display:flex; gap:6px;">
        <button class="pill hammer" id="btn-hammer" title="martillo">🔨 <span id="h-n">0</span></button>
        <button class="pill hammer" id="btn-glove" title="guante">🧤 <span id="gl-n">0</span></button>
      </span>
      <span id="g-moves">20 mov.</span>
    </div>
    <div class="goals" id="g-goals"></div>
    <div id="board"></div>
    <div class="legend" id="legend"></div>
  </section>

  <!-- ================= PROGRESO ================= -->
  <section id="tab-stats" class="tab">
    <div id="stats-area"></div>
  </section>

  <!-- ================= REPASO ================= -->
  <section id="tab-repaso" class="tab">
    <div id="rev-area"></div>
  </section>
</main>

<footer>
  <span><strong>v0.25</strong> · <span id="save-note">guardado en este dispositivo</span></span>
  <span><button id="btn-data">copia de seguridad</button> · <button id="btn-reset">reiniciar todo</button></span>
</footer>

<nav>
  <button data-tab="casa" class="active">🏠 Casa</button>
  <button data-tab="juego">🍎 Juego</button>
  <button data-tab="repaso">📖 Repaso<span class="nbadge" id="nav-due" style="display:none">0</span></button>
  <button data-tab="stats">📊 Progreso</button>
</nav>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<script>
/* ============================================================
   GAME CORE — pure logic, no DOM (portable to Swift)
   ============================================================ */
/*CORE-START*/
const COLS = 9, ROWS = 9, NTYPES = 5;
const SP = { R:'R', B:'B', P:'P', L:'L' };

function randType(){ return Math.floor(Math.random() * NTYPES); }
function isSpecial(v){ return v !== null && typeof v === 'object' && !!v.sp; }
function isNormal(v){ return typeof v === 'number'; }
function isStatic(v){ return v !== null && typeof v === 'object' && !!v.ob; }
function isDrop(v){ return v !== null && typeof v === 'object' && !!v.dr; }
function isMovable(v){ return isNormal(v) || isSpecial(v) || isDrop(v); }
function colorOf(v){
  if (typeof v === 'number') return v;
  if (v && v.ob === 'cad') return v.tile;
  return null;
}
function key(r, c){ return r + ',' + c; }
function inB(r, c){ return r >= 0 && r < ROWS && c >= 0 && c < COLS; }
function getC(b, r, c){ return inB(r, c) ? b[r][c] : null; }

function swapCells(b, a, d){
  const t = b[a.r][a.c]; b[a.r][a.c] = b[d.r][d.c]; b[d.r][d.c] = t;
}

/* Map chars: '.' free '#' hole 'B' caja 'X' caja hp2 'C' chained
   'D' dropper (empanada) 'J' jelly overlay (orbayu) */
function parseMap(map){
  const mask = new Set(), statics = [], drops = [], jelly = [];
  for (let r = 0; r < ROWS; r++){
    for (let c = 0; c < COLS; c++){
      const ch = map[r][c];
      if (ch === '#') mask.add(key(r, c));
      else if (ch === 'B') statics.push({ r, c, cell:{ ob:'caja', hp:1 } });
      else if (ch === 'X') statics.push({ r, c, cell:{ ob:'caja', hp:2 } });
      else if (ch === 'C') statics.push({ r, c, cell:{ ob:'cad' } });
      else if (ch === 'D') drops.push({ r, c });
      else if (ch === 'J') jelly.push(key(r, c));
    }
  }
  return { mask, statics, drops, jelly };
}

function buildBoard(mask, statics, drops){
  const staticAt = {};
  statics.forEach(sd => staticAt[key(sd.r, sd.c)] = sd.cell);
  const dropAt = new Set((drops || []).map(d => key(d.r, d.c)));
  let b, guard = 0;
  do {
    b = Array.from({length: ROWS}, () => new Array(COLS).fill(null));
    for (let r = 0; r < ROWS; r++){
      for (let c = 0; c < COLS; c++){
        const k = key(r, c);
        if (mask.has(k)) continue;
        if (dropAt.has(k)){ b[r][c] = { dr:1 }; continue; }
        const st = staticAt[k];
        if (st && st.ob === 'caja'){ b[r][c] = { ob:'caja', hp: st.hp }; continue; }
        let t, tries = 0;
        do { t = randType(); tries++; }
        while (tries < 60 && (
          (colorOf(getC(b, r, c-1)) === t && colorOf(getC(b, r, c-2)) === t) ||
          (colorOf(getC(b, r-1, c)) === t && colorOf(getC(b, r-2, c)) === t) ||
          (colorOf(getC(b, r-1, c)) === t && colorOf(getC(b, r-1, c-1)) === t && colorOf(getC(b, r, c-1)) === t)
        ));
        b[r][c] = (st && st.ob === 'cad') ? { ob:'cad', tile:t } : t;
      }
    }
  } while (!moveExists(b, mask) && ++guard < 60);
  return b;
}

function findRuns(b){
  const runs = [];
  for (let r = 0; r < ROWS; r++){
    let start = 0;
    for (let c = 1; c <= COLS; c++){
      const same = c < COLS && colorOf(b[r][c]) !== null && colorOf(b[r][c]) === colorOf(b[r][c-1]);
      if (!same){
        const len = c - start;
        if (len >= 3 && colorOf(b[r][start]) !== null)
          runs.push({ dir:'h', len, cells: Array.from({length:len}, (_,i) => ({r, c:start+i})) });
        start = c;
      }
    }
  }
  for (let c = 0; c < COLS; c++){
    let start = 0;
    for (let r = 1; r <= ROWS; r++){
      const same = r < ROWS && colorOf(b[r][c]) !== null && colorOf(b[r][c]) === colorOf(b[r-1][c]);
      if (!same){
        const len = r - start;
        if (len >= 3 && colorOf(b[start][c]) !== null)
          runs.push({ dir:'v', len, cells: Array.from({length:len}, (_,i) => ({r:start+i, c})) });
        start = r;
      }
    }
  }
  return runs;
}

function findSquares(b){
  const sq = [];
  for (let r = 0; r < ROWS - 1; r++){
    for (let c = 0; c < COLS - 1; c++){
      const v = colorOf(b[r][c]);
      if (v !== null && colorOf(b[r][c+1]) === v && colorOf(b[r+1][c]) === v && colorOf(b[r+1][c+1]) === v)
        sq.push({r, c});
    }
  }
  return sq;
}

/* 5+ line -> Laser, L/T -> Bomb, 4 line -> Rocket, 2x2 -> Plane */
function analyzeMatches(b, swapPos){
  const runs = findRuns(b);
  const clear = new Set();
  const spawns = [];
  runs.forEach(run => run.cells.forEach(p => clear.add(key(p.r, p.c))));

  const spawnAt = (cells) => {
    if (swapPos){
      const hit = cells.find(p => p.r === swapPos.r && p.c === swapPos.c);
      if (hit) return hit;
    }
    return cells[Math.floor(cells.length / 2)];
  };

  const consumed = new Set();
  for (let i = 0; i < runs.length; i++){
    for (let j = i + 1; j < runs.length; j++){
      if (runs[i].dir === runs[j].dir || consumed.has(i) || consumed.has(j)) continue;
      const shared = runs[i].cells.find(p => runs[j].cells.some(q => q.r === p.r && q.c === p.c));
      if (shared){
        spawns.push({ r:shared.r, c:shared.c, piece:{ sp:SP.B } });
        consumed.add(i); consumed.add(j);
      }
    }
  }
  runs.forEach((run, i) => {
    if (consumed.has(i)) return;
    if (run.len >= 5){
      const p = spawnAt(run.cells);
      spawns.push({ r:p.r, c:p.c, piece:{ sp:SP.L } });
    } else if (run.len === 4){
      const p = spawnAt(run.cells);
      spawns.push({ r:p.r, c:p.c, piece:{ sp:SP.R, dir: run.dir === 'h' ? 'v' : 'h' } });
    }
  });

  for (const s of findSquares(b)){
    const cells = [{r:s.r,c:s.c},{r:s.r,c:s.c+1},{r:s.r+1,c:s.c},{r:s.r+1,c:s.c+1}];
    if (cells.some(p => clear.has(key(p.r, p.c)))) continue;
    cells.forEach(p => clear.add(key(p.r, p.c)));
    const p = spawnAt(cells);
    spawns.push({ r:p.r, c:p.c, piece:{ sp:SP.P } });
  }

  const seen = new Set();
  const uniq = spawns.filter(s => {
    const k = key(s.r, s.c);
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });
  return { clear, spawns: uniq };
}

/* Gravity: reachability physics with cascading diagonal infill.
   Straight falls pass through holes; statics block; starved cells
   rescue diagonally; unreachable (fully roofed) cells stay empty. */
function applyGravity(b, mask){
  const masked = (r, c) => mask && mask.has(key(r, c));
  const playable = (r, c) => inB(r, c) && !masked(r, c);
  const feederRow = (r, c) => {
    let fr = r - 1;
    while (fr >= 0 && masked(fr, c)) fr--;
    return fr;
  };
  const verticalSweep = () => {
    let moved = false;
    for (let r = ROWS - 1; r >= 0; r--){
      for (let c = 0; c < COLS; c++){
        if (!playable(r, c) || b[r][c] !== null) continue;
        const fr = feederRow(r, c);
        if (fr < 0){ b[r][c] = randType(); moved = true; }
        else if (isMovable(b[fr][c])){ b[r][c] = b[fr][c]; b[fr][c] = null; moved = true; }
      }
    }
    return moved;
  };
  const starved = (r, c) => {
    let fr = feederRow(r, c);
    while (fr >= 0 && b[fr][c] === null) fr = feederRow(fr, c);
    return fr >= 0 && isStatic(b[fr][c]);
  };
  let guard = 0;
  while (++guard < 800){
    let vguard = 0;
    while (verticalSweep() && ++vguard < 200){}
    let rescued = false;
    outer:
    for (let r = 0; r < ROWS; r++){
      for (let c = 0; c < COLS; c++){
        if (!playable(r, c) || b[r][c] !== null || !starved(r, c)) continue;
        const dirs = Math.random() < 0.5 ? [-1, 1] : [1, -1];
        for (const dc of dirs){
          const dr = feederRow(r, c + dc);
          if (dr >= 0 && playable(dr, c + dc) && isMovable(b[dr][c + dc])){
            b[r][c] = b[dr][c + dc];
            b[dr][c + dc] = null;
            rescued = true;
            break outer;
          }
        }
      }
    }
    if (!rescued) break;
  }
}

function mostCommonColor(b){
  const counts = new Array(NTYPES).fill(0);
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (isNormal(b[r][c])) counts[b[r][c]]++;
  let best = 0;
  counts.forEach((n, i) => { if (n > counts[best]) best = i; });
  return best;
}

/* Blast engine. Returns {clear, events} — events describe the visual
   timeline (rocket streaks, plane flights, booms, rings) in chain order.
   pickTarget(cands) chooses plane destinations (goal-aware in the UI).
   Droppers are indestructible: blasts pass over them.
   Effect types: cell, row, col, rect, color, board, fire, sink, anim. */
function runEffects(b, seeds, pickTarget){
  const pick = pickTarget || (cands => cands[(Math.random() * cands.length) | 0]);
  const clear = new Set(), enq = new Set(), done = new Set(), events = [];
  const q = seeds.slice();
  for (const e of q){ if (e.type === 'fire' || e.type === 'sink') enq.add(key(e.r, e.c)); }

  const hit = (r, c) => {
    if (!inB(r, c) || b[r][c] === null || isDrop(b[r][c])) return;
    const k = key(r, c);
    clear.add(k);
    if (isSpecial(b[r][c]) && !enq.has(k)){ enq.add(k); q.push({ type:'fire', r, c }); }
  };
  const planeCands = (excl) => {
    const cands = [];
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (b[r][c] !== null && !isDrop(b[r][c]) && !clear.has(key(r, c)) &&
            !(excl && excl.some(p => p.r === r && p.c === c))) cands.push({r, c});
    return cands;
  };

  let guard = 0;
  while (q.length && ++guard < 600){
    const e = q.shift();
    if (e.type === 'anim') events.push(e.ev);
    else if (e.type === 'cell') hit(e.r, e.c);
    else if (e.type === 'sink'){
      if (inB(e.r, e.c) && b[e.r][e.c] !== null){ clear.add(key(e.r, e.c)); done.add(key(e.r, e.c)); }
    }
    else if (e.type === 'row'){
      events.push({ t:'streak', axis:'h', line:e.r, o:e.o || { r:e.r, c:(COLS/2)|0 } });
      for (let c = 0; c < COLS; c++) hit(e.r, c);
    }
    else if (e.type === 'col'){
      events.push({ t:'streak', axis:'v', line:e.c, o:e.o || { r:(ROWS/2)|0, c:e.c } });
      for (let r = 0; r < ROWS; r++) hit(r, e.c);
    }
    else if (e.type === 'rect'){
      events.push({ t:'boom', r:e.r, c:e.c, rad:e.rad });
      for (let dr = -e.rad; dr <= e.rad; dr++)
        for (let dc = -e.rad; dc <= e.rad; dc++) hit(e.r + dr, e.c + dc);
    }
    else if (e.type === 'color'){
      events.push({ t:'ring', r: e.o ? e.o.r : (ROWS/2)|0, c: e.o ? e.o.c : (COLS/2)|0, big:false });
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (b[r][c] === e.color) hit(r, c);
    }
    else if (e.type === 'board'){
      events.push({ t:'ring', r:(ROWS/2)|0, c:(COLS/2)|0, big:true });
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++) hit(r, c);
    }
    else if (e.type === 'fire'){
      const k = key(e.r, e.c);
      if (done.has(k)) continue;
      done.add(k);
      if (!inB(e.r, e.c)) continue;
      const v = b[e.r][e.c];
      if (v !== null) clear.add(k);
      if (!isSpecial(v)) continue;
      if (v.sp === SP.R) q.push(v.dir === 'h' ? { type:'row', r:e.r, o:{r:e.r,c:e.c} } : { type:'col', c:e.c, o:{r:e.r,c:e.c} });
      else if (v.sp === SP.B) q.push({ type:'rect', r:e.r, c:e.c, rad:1 });
      else if (v.sp === SP.P){
        [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr, dc]) => hit(e.r + dr, e.c + dc));
        const cands = planeCands();
        if (cands.length){
          const t = pick(cands);
          events.push({ t:'plane', fr:{r:e.r, c:e.c}, to:t });
          hit(t.r, t.c);
        }
      }
      else if (v.sp === SP.L){
        events.push({ t:'laser', r:e.r, c:e.c });
        q.push({ type:'color', color: mostCommonColor(b), o:{r:e.r, c:e.c} });
      }
    }
  }
  return { clear, events };
}

/* Seeds for a swap involving at least one special (positions POST-swap). */
function buildSwapSeeds(b, aPos, dPos, pickTarget){
  const pick = pickTarget || (cands => cands[(Math.random() * cands.length) | 0]);
  const A = b[aPos.r][aPos.c], D = b[dPos.r][dPos.c];
  const bothSp = isSpecial(A) && isSpecial(D);

  if (!bothSp){
    const sPos = isSpecial(A) ? aPos : dPos;
    const oPos = isSpecial(A) ? dPos : aPos;
    const Spc = b[sPos.r][sPos.c], O = b[oPos.r][oPos.c];
    if (Spc.sp === SP.L){
      return [
        { type:'anim', ev:{ t:'laser', r:sPos.r, c:sPos.c } },
        { type:'sink', r:sPos.r, c:sPos.c },
        { type:'color', color: isNormal(O) ? O : mostCommonColor(b), o:{r:sPos.r, c:sPos.c} }
      ];
    }
    return [{ type:'fire', r:sPos.r, c:sPos.c }];
  }

  const seeds = [
    { type:'sink', r:aPos.r, c:aPos.c },
    { type:'sink', r:dPos.r, c:dPos.c }
  ];
  const has = x => A.sp === x || D.sp === x;
  const R0 = dPos.r, C0 = dPos.c;
  const cross = (p) => [[0,0],[-1,0],[1,0],[0,-1],[0,1]]
    .forEach(([dr, dc]) => seeds.push({ type:'cell', r:p.r + dr, c:p.c + dc }));

  if (A.sp === SP.L && D.sp === SP.L) return [{ type:'board' }];
  if (has(SP.L)){
    const otherPos = A.sp === SP.L ? dPos : aPos;
    const laserPos = A.sp === SP.L ? aPos : dPos;
    seeds.push({ type:'anim', ev:{ t:'laser', r:laserPos.r, c:laserPos.c } });
    seeds.push({ type:'color', color: mostCommonColor(b), o:laserPos });
    seeds.push({ type:'fire', r:otherPos.r, c:otherPos.c });
    return seeds;
  }
  if (A.sp === SP.R && D.sp === SP.R){
    seeds.push({ type:'row', r:R0, o:{r:R0,c:C0} }, { type:'col', c:C0, o:{r:R0,c:C0} });
    return seeds;
  }
  if (has(SP.R) && has(SP.B)){
    for (let d = -1; d <= 1; d++)
      seeds.push({ type:'row', r:R0 + d, o:{r:R0+d,c:C0} }, { type:'col', c:C0 + d, o:{r:R0,c:C0+d} });
    return seeds;
  }
  if (A.sp === SP.B && D.sp === SP.B){
    seeds.push({ type:'rect', r:R0, c:C0, rad:2 });
    return seeds;
  }
  if (has(SP.P)){
    const planePos = A.sp === SP.P ? aPos : dPos;
    const otherPos = A.sp === SP.P ? dPos : aPos;
    const other = b[otherPos.r][otherPos.c];
    cross(planePos);
    const cands = [];
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (b[r][c] !== null && !isDrop(b[r][c]) &&
            !(r === aPos.r && c === aPos.c) &&
            !(r === dPos.r && c === dPos.c)) cands.push({r, c});
    const pickT = () => cands.length ? pick(cands) : dPos;
    const t = pickT();
    seeds.push({ type:'anim', ev:{ t:'plane', fr:planePos, to:t } });
    if (other.sp === SP.P){
      cross(otherPos);
      const t2 = pickT();
      seeds.push({ type:'anim', ev:{ t:'plane', fr:otherPos, to:t2 } });
      cross(t); cross(t2);
    } else if (other.sp === SP.R){
      seeds.push({ type:'row', r:t.r, o:t }, { type:'col', c:t.c, o:t });
    } else if (other.sp === SP.B){
      seeds.push({ type:'rect', r:t.r, c:t.c, rad:1 });
    }
    return seeds;
  }
  seeds.push({ type:'fire', r:aPos.r, c:aPos.c }, { type:'fire', r:dPos.r, c:dPos.c });
  return seeds;
}

function findAnyMove(b, mask){
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (isSpecial(b[r][c])) return { a:{r, c}, d:{r, c} };
  const moves = [];
  for (let r = 0; r < ROWS; r++){
    for (let c = 0; c < COLS; c++){
      if (!isMovable(b[r][c])) continue;
      for (const d of [{r, c:c+1}, {r:r+1, c}]){
        if (d.r >= ROWS || d.c >= COLS) continue;
        if (!isMovable(b[d.r][d.c])) continue;
        swapCells(b, {r, c}, d);
        const ok = analyzeMatches(b, null).clear.size > 0;
        swapCells(b, {r, c}, d);
        if (ok) moves.push({ a:{r, c}, d });
      }
    }
  }
  return moves.length ? moves[(Math.random() * moves.length) | 0] : null;
}
function moveExists(b, mask){ return findAnyMove(b, mask) !== null; }

/* ============================================================
   SRS — FSRS-5 scheduler (retention target 0.9)
   Two-grade UI: Otra vez -> Again(1), Bien -> Good(3).
   New cards get a 10-min learning step; the closing Bien of a
   session assigns the real interval (= stability in days).
   ============================================================ */
/*SRS-START*/
const MIN = 60000, DAY = 86400000;
const FW = [0.40255,1.18385,3.173,15.69105,7.1949,0.5345,1.4604,0.0046,1.54575,0.1192,1.01925,1.9395,0.11,0.29605,2.2698,0.2315,2.9898,0.51655,0.6621];
const F_FACTOR = 19/81, F_DECAY = -0.5;
const clampN = (x, lo, hi) => Math.min(hi, Math.max(lo, x));

function fsrsR(tDays, stab){ return Math.pow(1 + F_FACTOR * tDays / stab, F_DECAY); }
function fsrsS0(g){ return Math.max(FW[g-1], 0.01); }
function fsrsD0(g){ return clampN(FW[4] - Math.exp(FW[5]*(g-1)) + 1, 1, 10); }
function fsrsNextD(D, g){
  const Dp = D + (-FW[6]*(g-3)) * (10 - D) / 9;
  return clampN(FW[7]*fsrsD0(4) + (1-FW[7])*Dp, 1, 10);
}
function fsrsSuccess(D, stab, R, g){
  const hard = g === 2 ? FW[15] : 1;
  const easy = g === 4 ? FW[16] : 1;
  return stab * (1 + Math.exp(FW[8]) * (11-D) * Math.pow(stab, -FW[9]) * (Math.exp(FW[10]*(1-R)) - 1) * hard * easy);
}
function fsrsLapse(D, stab, R){
  return Math.min(stab, FW[11] * Math.pow(D, -FW[12]) * (Math.pow(stab+1, FW[13]) - 1) * Math.exp(FW[14]*(1-R)));
}
/* g: 1 = Again (Otra vez), 3 = Good (Bien) */
function fsrsReview(card, g){
  const now = Date.now();
  if (card.S === undefined){
    card.S = fsrsS0(g);
    card.D = fsrsD0(g);
  } else {
    const t = Math.max(1/1440, (now - (card.last || now)) / DAY);
    const R = fsrsR(t, card.S);
    card.D = fsrsNextD(card.D, g);
    card.S = g === 1 ? fsrsLapse(card.D, card.S, R) : fsrsSuccess(card.D, card.S, R, g);
  }
  card.last = now;
  card.reps = (card.reps || 0) + 1;
  if (g === 1){
    card.lapses = (card.lapses || 0) + 1;
    card.due = now + MIN;                 // learning step within the session
  } else {
    card.due = now + Math.round(Math.max(card.S, 10/1440) * DAY);
  }
}
function newCard(item, kind, tier){
  return { id:item.id, kind: kind || 'obj', tier: tier || 0, due: Date.now() + 10*MIN, reps:0 };
}
/*SRS-END*/
function dueCards(){
  const now = Date.now();
  return S.deck.filter(c => c.kind !== 'cmd' && c.due <= now);   // exam drill has its own track
}
function dueCmds(){

}

/* ============================================================
   STATE + persistence
   ============================================================ */
const DEFAULT_STATE = { stars:3, level:1, owned:[], deck:[], sound:true, hammers:1, gloves:1, room:'sala', tasks:[], tier:{}, welcomed:false, log:[] };
let S;
let memoryOnly = false;

function loadState(){
  try {
    const raw = localStorage.getItem('piso-asturiano');
    S = raw ? JSON.parse(raw) : structuredClone(DEFAULT_STATE);
  } catch(e){
    memoryOnly = true;
    S = structuredClone(DEFAULT_STATE);
  }
  if (S.sound === undefined) S.sound = true;
  if (S.hammers === undefined) S.hammers = 1;
  if (S.owned === undefined) S.owned = [];
  if (S.deck === undefined) S.deck = [];
  if (S.tasks === undefined) S.tasks = [];
  if (S.tier === undefined) S.tier = {};
  if (S.welcomed === undefined) S.welcomed = false;
  if (S.log === undefined) S.log = [];
  // migrate legacy tasks[] (bare item.id) to tier-aware tasks[] (composite id "baseId:0")
  if (S.tasks.length && typeof S.tasks[0] === 'string' && !S.tasks[0].includes(':')){
    S.tasks = S.tasks.map(id => id + ':0');
  }
  if (S.gloves === undefined) S.gloves = 1;
  // migrate Leitner-era cards to FSRS
  const boxToS = { 1:0.4, 2:1, 3:3, 4:7, 5:21 };
  S.deck.forEach(c => {
    if (c.kind === undefined) c.kind = 'obj';
    if (c.S === undefined && c.box !== undefined){
      c.S = boxToS[c.box] || 1;
      c.D = 5;
      c.last = c.due - c.S * DAY;
      delete c.box;
    }
  });
  if (memoryOnly) document.getElementById('save-note').textContent = 'sesión sin guardar (abre el archivo en Safari para guardar)';
}
function save(){
  if (memoryOnly) return;
  try { localStorage.setItem('piso-asturiano', JSON.stringify(S)); } catch(e){ memoryOnly = true; }
}
function roomUnlocked(room){
  if (room === 'garaje') return true;   // driving school waits for no sofa
  const idx = ROOM_ORDER.indexOf(room);
  if (idx <= 0) return true;
  const prev = ROOM_ORDER[idx - 1];
  return roomUnlocked(prev) && CATALOG.filter(i => i.room === prev).every(i => S.owned.includes(i.id));
}

/* ============================================================
   AUDIO — es-ES speech + synthesized SFX
   ============================================================ */
function speak(text){
  if (S && S.sound === false) return;
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'es-ES';
    const v = speechSynthesis.getVoices().find(v => v.lang && v.lang.startsWith('es'));
    if (v) u.voice = v;
    u.rate = 0.9;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  } catch(e){}
}
if ('speechSynthesis' in window) speechSynthesis.getVoices();

let AC = null;
function audioCtx(){
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(freq, dur, type, vol, delay, slideTo){
  if (S && S.sound === false) return;
  try {
    const ac = audioCtx();
    const t = ac.currentTime + (delay || 0);
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
    g.gain.setValueAtTime(vol || 0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + dur + 0.03);
  } catch(e){}
}

function renderRoomTabs(){
  const el = $('room-tabs');
  el.innerHTML = '';
  for (const [id, r] of Object.entries(ROOMS)){
    const b = document.createElement('button');
    const unlocked = roomUnlocked(id);
    b.textContent = r.label + (unlocked ? '' : ' 🔒');
    b.classList.toggle('active', S.room === id);
    b.addEventListener('click', () => {
      if (!unlocked){
        const prev = ROOM_ORDER[ROOM_ORDER.indexOf(id) - 1];
        const left = CATALOG.filter(i => i.room === prev && !S.owned.includes(i.id)).length;
        showModal('<div class="em">🔒</div><h2>' + r.label + ' espera</h2><p>Termina ' + ROOM_ES[prev] + ' primero — faltan ' + left + ' objetos.</p><button class="btn btn-bien" onclick="closeModal()">Vale</button>');

      }
      S.room = id; save();
      drillQueue = []; drillMode = null;
      renderRoomTabs(); renderRoom(); renderDrill(); renderTasks(); renderShop();
    });
    el.appendChild(b);
  }
}

function levelSpec(n){
  const base = LEVELS[(n - 1) % LEVELS.length];
  const cycle = Math.floor((n - 1) / LEVELS.length);
  const goals = base.goals.map(g => ({ ...g, n: g.n + (g.t === 'tile' ? 5 * cycle : 0) }));
  const parsed = parseMap(base.map);
  const nCaja = parsed.statics.filter(x => x.cell.ob === 'caja').length;
  const nCad  = parsed.statics.filter(x => x.cell.ob === 'cad').length;
  if (nCaja) goals.push({ t:'caja', n:nCaja });
  if (nCad)  goals.push({ t:'cadena', n:nCad });
  if (parsed.drops.length) goals.push({ t:'drop', n:parsed.drops.length });
  if (parsed.jelly.length) goals.push({ t:'orbayu', n:parsed.jelly.length });
  return { moves: base.moves, map: base.map, goals };
}

/* ---------- goals ---------- */
function goalKey(g){ return g.t === 'tile' ? 'tile-' + g.tile : g.t; }
function goalEmoji(k){
  if (k === 'caja') return '📦';
  if (k === 'cadena') return '⛓️';

function goalsMet(){ return Object.values(goalsLeft).every(n => n <= 0); }
function dec(k){ if (goalsLeft[k] !== undefined && goalsLeft[k] > 0) goalsLeft[k]--; }
function creditClear(v){
  if (typeof v === 'number') dec('tile-' + v);
  else if (v && v.ob === 'cad'){ dec('cadena'); dec('tile-' + v.tile); }
  else if (v && v.ob === 'caja') dec('caja');
}

/* goal-aware plane targeting: prefer cells that advance open goals */
function pickPlaneTarget(cands){
  const wanted = cands.filter(p => {
    const v = board[p.r][p.c];
    const k = key(p.r, p.c);
    if (goalsLeft['caja'] > 0 && v && v.ob === 'caja') return true;
    if (goalsLeft['cadena'] > 0 && v && v.ob === 'cad') return true;
    if (goalsLeft['orbayu'] > 0 && LVL.jelly.has(k)) return true;
    const col = colorOf(v);
    if (col !== null && goalsLeft['tile-' + col] > 0) return true;
    return false;
  });
  const pool = wanted.length ? wanted : cands;
  return pool[(Math.random() * pool.length) | 0];
}

/* ---------- FX layer: special-piece animations ---------- */
function cellCenter(r, c){
  const el = $('board').children[r * COLS + c];
  return { x: el.offsetLeft + el.offsetWidth / 2, y: el.offsetTop + el.offsetHeight / 2, s: el.offsetWidth };
}
function fxEl(text, x, y, cls){
  const s = document.createElement('span');
  s.className = 'fx ' + (cls || '');
  s.textContent = text;
  s.style.left = x + 'px';
  s.style.top = y + 'px';
  $('board').appendChild(s);
  return s;
}
function fxRocketPair(o, axis){
  const oc = cellCenter(o.r, o.c);
  const ends = axis === 'h'
    ? [cellCenter(o.r, 0), cellCenter(o.r, COLS - 1)]
    : [cellCenter(0, o.c), cellCenter(ROWS - 1, o.c)];
  SFX.whoosh();
  ends.forEach(end => {
    const dx = end.x - oc.x, dy = end.y - oc.y;
    let deg;
    if (axis === 'h') deg = dx >= 0 ? 45 : 225;
    else deg = dy >= 0 ? 135 : -45;
    const el = fxEl('🚀', oc.x, oc.y, 'fx-rocket');
    el.style.transform = 'translate(-50%,-50%) rotate(' + deg + 'deg)';
    el.offsetWidth; // reflow so the transition runs
    el.style.transform = 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px)) rotate(' + deg + 'deg)';
    setTimeout(() => el.remove(), 480);
  });
}
function fxBoom(r, c, rad){
  const o = cellCenter(r, c);
  const el = fxEl('💥', o.x, o.y, 'fx-boom');
  el.style.setProperty('--boom-scale', (1.6 + rad * 1.6).toFixed(1));
  SFX.boom();
  setTimeout(() => el.remove(), 420);
}
function fxPlane(fr, to){
  const a = cellCenter(fr.r, fr.c), b = cellCenter(to.r, to.c);
  const dx = b.x - a.x, dy = b.y - a.y;
  const deg = Math.atan2(dy, dx) * 180 / Math.PI;
  const el = fxEl('✈️', a.x, a.y, 'fx-plane');
  el.style.transform = 'translate(-50%,-50%) rotate(' + deg + 'deg)';
  el.offsetWidth;
  SFX.whoosh();
  el.style.transform = 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px)) rotate(' + deg + 'deg)';
  setTimeout(() => { el.remove(); fxBoom(to.r, to.c, 0); }, 500);
}
function fxRing(r, c, big){
  const o = cellCenter(r, c);
  const el = fxEl('', o.x, o.y, 'fx-ring');
  el.style.setProperty('--ring-scale', big ? 26 : 16);
  setTimeout(() => el.remove(), 550);
}
function fxLaser(r, c){
  const o = cellCenter(r, c);
  const el = fxEl('🔮', o.x, o.y, 'fx-laser');
  setTimeout(() => el.remove(), 480);
}
async function playEffects(events){
  if (!events || !events.length) return;
  let delay = 0;
  for (const ev of events){
    const d = delay;
    setTimeout(() => {
      try {
        if (ev.t === 'streak') fxRocketPair(ev.o, ev.axis);
        else if (ev.t === 'boom') fxBoom(ev.r, ev.c, ev.rad);
        else if (ev.t === 'plane') fxPlane(ev.fr, ev.to);
        else if (ev.t === 'laser'){ fxLaser(ev.r, ev.c); fxRing(ev.r, ev.c, false); }
        else if (ev.t === 'ring') fxRing(ev.r, ev.c, ev.big);
      } catch(e){}
    }, d);
    delay += 140;
  }
  await sleep(Math.min(delay + 480, 2200));
}

/* ---------- clearing & goal credit ---------- */
async function clearAndDrop(hits, spawns, popDelay, adjDamage){
  const clearSet = new Set(), dmgSet = new Set();
  const damage = (rr, cc) => {
    const nk = key(rr, cc);
    const nv = getC(board, rr, cc);
    if (nv && nv.ob === 'caja' && !dmgSet.has(nk)){
      dmgSet.add(nk);
      nv.hp--;
      if (nv.hp <= 0){ clearSet.add(nk); creditClear(nv); }
    }
  };
  for (const k of hits){
    const [r, c] = k.split(',').map(Number);
    const v = board[r][c];
    if (v === null) continue;
    if (v.ob === 'caja') damage(r, c);
    else { clearSet.add(k); creditClear(v); }
  }
  if (adjDamage){
    for (const k of [...clearSet]){
      const [r, c] = k.split(',').map(Number);
      [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dr, dc]) => damage(r + dr, c + dc));
    }
  }
  // orbayu: any clear on a jelly cell removes the jelly
  for (const k of clearSet){
    if (LVL.jelly.has(k)){
      LVL.jelly.delete(k);
      jellyClearedThisTurn = true;
    }
  }
  if (goalsLeft['orbayu'] !== undefined) goalsLeft['orbayu'] = LVL.jelly.size;

  renderBoard(clearSet, dmgSet);
  await sleep(popDelay || 230);
  for (const k of clearSet){
    const [r, c] = k.split(',');
    board[r][c] = null;
  }
  if (spawns) for (const sp of spawns) board[sp.r][sp.c] = sp.piece;
  applyGravity(board, LVL.mask);
  collectDrops();
  renderBoard(); renderGameHUD(); renderGoals();
  await sleep(160);
}

/* droppers reaching the floor of their column are collected */
function collectDrops(){
  let again = true, guard = 0;
  while (again && ++guard < 20){
    again = false;
    for (let r = 0; r < ROWS; r++){
      for (let c = 0; c < COLS; c++){
        if (!isDrop(board[r][c])) continue;
        let below = false;
        for (let rr = r + 1; rr < ROWS; rr++)
          if (!LVL.mask.has(key(rr, c))){ below = true; break; }
        if (!below){
          board[r][c] = null;
          dec('drop');
          SFX.drop();
          again = true;
        }
      }
    }
    if (again) applyGravity(board, LVL.mask);
  }
}

async function resolveCascades(swapPos){
  let cascade = 1;
  while (true){
    const { clear, spawns } = analyzeMatches(board, cascade === 1 ? swapPos : null);
    if (clear.size === 0) break;
    const first = clear.values().next().value.split(',');
    const col = colorOf(board[first[0]][first[1]]);
    if (col !== null) floatWord(TILES[col].es);
    if (cascade >= 2) floatPraise(cascade);
    SFX.pop(cascade);
    await clearAndDrop(clear, spawns, 230, true);
    cascade++;
  }
}

async function detonate(seeds){
  const { clear, events } = runEffects(board, seeds, pickPlaneTarget);
  await playEffects(events);
  await clearAndDrop(clear, null, 150, false);
  await resolveCascades(null);
}

/* leftover moves become rockets that auto-fire (Homescapes finale).
   Paced for savoring: rockets land one by one, then fire one at a time,
   each with its full streak animation and board settle. */
async function finale(){
  const n = Math.min(moves, 6);
  if (n <= 0) return;
  moves = 0;
  renderGameHUD();
  const placed = [];
  const frees = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (isNormal(board[r][c])) frees.push({r, c});
  for (let i = 0; i < n && frees.length; i++){
    const idx = (Math.random() * frees.length) | 0;
    const p = frees.splice(idx, 1)[0];
    board[p.r][p.c] = { sp:SP.R, dir: Math.random() < 0.5 ? 'h' : 'v' };
    placed.push(p);
    renderBoard();
    SFX.select();
    await sleep(220);
  }
  if (!placed.length) return;
  floatPraise(5);
  await sleep(700);
  for (const p of placed){
    // a previous rocket may have already swept this one away (it fired as a chain)
    if (isSpecial(board[p.r][p.c])){
      await detonate([{ type:'fire', r:p.r, c:p.c }]);
      await sleep(300);
    }
  }
}

/* ---------- input ---------- */
async function tapCell(r, c){
  if (busy || levelDone) return;
  const k = key(r, c);
  if (LVL.mask.has(k)) return;
  const v = board[r][c];

  if (hammerMode){
    hammerMode = false; updateHammer();
    if (v === null){ renderBoard(); return; }
    S.hammers--; save();
    busy = true;
    hintCells = null; clearTimeout(hintTimer);
    jellyClearedThisTurn = false;
    await detonate([{ type:'cell', r, c }]);
    await finishTurn(false);
    return;
  }

  if (gloveMode){
    if (v === null || !isMovable(v)){ SFX.bad(); return; }
    if (!glovePick){
      glovePick = { r, c };
      sel = { r, c };                        // reuse the selection highlight
      SFX.select(); renderBoard(); return;
    }
    if (glovePick.r === r && glovePick.c === c){
      glovePick = null; sel = null; renderBoard(); return;
    }
    const gAdj = Math.abs(glovePick.r - r) + Math.abs(glovePick.c - c) === 1;
    if (!gAdj){ glovePick = { r, c }; sel = { r, c }; SFX.select(); renderBoard(); return; }
    // free swap: no match required, no move consumed
    gloveMode = false;
    const gp = glovePick; glovePick = null; sel = null;
    S.gloves--; save();
    updateHammer();
    busy = true;
    hintCells = null; clearTimeout(hintTimer);
    jellyClearedThisTurn = false;
    swapCells(board, gp, { r, c });
    SFX.swap();
    renderBoard();
    await sleep(150);
    if (isSpecial(board[gp.r][gp.c]) || isSpecial(board[r][c])){
      await detonate(buildSwapSeeds(board, gp, { r, c }, pickPlaneTarget));
    } else {
      await resolveCascades({ r, c });       // resolves if a match formed; free either way
    }
    await finishTurn(false);
    return;
  }

  if (moves <= 0 || v === null) return;
  hintCells = null; clearTimeout(hintTimer);

  if (!isMovable(v)){ sel = null; SFX.bad(); renderBoard(); scheduleHint(); return; }

  if (!sel){ sel = {r, c}; SFX.select(); renderBoard(); scheduleHint(); return; }

  if (sel.r === r && sel.c === c){
    if (isSpecial(v)){
      busy = true; sel = null;
      moves--; renderGameHUD();
      jellyClearedThisTurn = false;
      await detonate([{ type:'fire', r, c }]);
      await finishTurn(true);
      return;
    }
    sel = null; renderBoard(); scheduleHint(); return;
  }

  const adj = Math.abs(sel.r - r) + Math.abs(sel.c - c) === 1;
  if (!adj){ sel = {r, c}; SFX.select(); renderBoard(); scheduleHint(); return; }

  busy = true;
  const a = sel; sel = null;
  swapCells(board, a, {r, c});
  SFX.swap();
  renderBoard();

  if (isSpecial(board[a.r][a.c]) || isSpecial(board[r][c])){
    moves--; renderGameHUD();
    jellyClearedThisTurn = false;
    await sleep(150);
    await detonate(buildSwapSeeds(board, a, {r, c}, pickPlaneTarget));
    await finishTurn(true);
    return;
  }

  const probe = analyzeMatches(board, {r, c});
  if (probe.clear.size === 0){
    await sleep(180);
    swapCells(board, a, {r, c});
    SFX.bad();
    renderBoard(); busy = false; scheduleHint(); return;
  }
  moves--;
  jellyClearedThisTurn = false;
  await resolveCascades({r, c});
  await finishTurn(true);
}

function reshuffleFree(){
  const statics = [], drops = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++){
      const v = board[r][c];
      if (isStatic(v)) statics.push({ r, c, cell: v.ob === 'caja' ? { ob:'caja', hp:v.hp } : { ob:'cad' } });
      else if (isDrop(v)) drops.push({ r, c });
    }
  board = buildBoard(LVL.mask, statics, drops);
}

/* orbayu spreads when a move passes without clearing any */
function spreadJelly(){
  if (LVL.jelly.size === 0 || goalsLeft['orbayu'] === undefined) return;
  const cands = [];
  for (const k of LVL.jelly){
    const [r, c] = k.split(',').map(Number);
    [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dr, dc]) => {
      const nr = r + dr, nc = c + dc, nk = key(nr, nc);
      if (inB(nr, nc) && !LVL.mask.has(nk) && !LVL.jelly.has(nk) &&
          isMovable(board[nr][nc]) && !isDrop(board[nr][nc])) cands.push(nk);
    });
  }
  if (cands.length){
    LVL.jelly.add(cands[(Math.random() * cands.length) | 0]);
    goalsLeft['orbayu'] = LVL.jelly.size;
  }
}

async function finishTurn(usedMove){
  if (usedMove && !jellyClearedThisTurn) spreadJelly();
  renderGoals();
  if (goalsMet()){
    if (moves > 0) await finale();
    winLevel();
    renderBoard();
    return;
  }
  if (!moveExists(board, LVL.mask)) reshuffleFree();
  renderBoard(); renderGameHUD();
  busy = false;
  scheduleHint();
  if (moves <= 0) loseLevel();
}

function answer(bien){
  const card = queue.shift();
  const prevLast = card.last;
  fsrsReview(card, bien ? 3 : 1);
  S.log.push({ t: Date.now(), id: card.id, k: card.kind, g: bien ? 3 : 1,
               el: prevLast ? +(((Date.now() - prevLast) / DAY).toFixed(2)) : 0,
               S: +card.S.toFixed(2) });
  if (S.log.length > 2000) S.log = S.log.slice(-2000);
  if (bien){ SFX.bien(); }
  else { queue.push(card); SFX.otra(); }
  save();
  if (queue.length === 0){
    S.stars++;
    S.hammers = (S.hammers || 0) + 1;
    save(); refreshHUD();
    if (typeof updateHammer === 'function') updateHammer();
    SFX.star();
    showModal(
      '<div class="em">🌟</div><h2>Repaso completado</h2>' +
      '<p>+1 estrella · +1 🔨 martillo. Tu memoria amuebla la casa.</p>' +
      '<button class="btn btn-bien" onclick="closeModal(); switchTab(\'casa\');">🏠 A la tienda</button> ' +
      '<button class="btn btn-audio" onclick="closeModal(); switchTab(\'juego\');">🍎 A jugar</button>'
    );
    renderReview();
  } else {
    revealed = false;
    renderCard();
  }
  refreshHUD();
}

let drillQueue = [], drillMode = null, drillSize = 0, drillRight = 0, drillLock = false, drillMissed = new Set();
let drillTimed = false;          // per-session opt-in toggle (not persisted)
const DRILL_TIME_MS = 8000;      // 8 seconds per card in timed mode
let drillTimerId = null, drillTimerTick = null;
let drillCardStartedAt = 0, drillReplayCount = 0;

function commandAttemptSchedules(mode, timed){
  return mode === 'due' && !timed;
}
function gradeCommandCard(card, grade, mode, timed){
  if (!commandAttemptSchedules(mode, timed)) return false;
  fsrsReview(card, grade);
  return true;
}
function drillSurfaceId(cmd){
  if (cmd.cat === 'rot') return 'roundabout-v2';
  if (cmd.cat === 'dir') return 'junction-v1';
  return 'icon-grid-v1';
}
function commandLogEntry(cmd, card, grade, context){
  return {
    t: context.now, id:card.id, k:'cmd', g:grade,
    S: +(card.S || 0).toFixed(2),
    phase:cmd.phase, mode:context.mode, timed:context.timed,
    first:context.first, selected:context.selected,
    ms:context.ms, replays:context.replays,
    surface:context.surface, scheduled:context.scheduled,
    timeout:context.timeout
  };
}
function recordCommandAttempt(cmd, card, grade, selected, timeout){
  const now = Date.now();
  const scheduled = gradeCommandCard(card, grade, drillMode, drillTimed);
  const entry = commandLogEntry(cmd, card, grade, {
    now, mode:drillMode, timed:drillTimed,
    first:!drillMissed.has(card.id), selected,
    ms:Math.max(0, now - drillCardStartedAt),
    replays:drillReplayCount, surface:drillSurfaceId(cmd),
    scheduled, timeout:!!timeout
  });
  S.log.push(entry);
  if (S.log.length > 2000) S.log = S.log.slice(-2000);
  save();
  return entry;
}

function seedCommands(){
  const supported = new Set(COMMANDS.map(c => c.id));
  const before = S.deck.length;
  // Retire provisional command cards that no longer have source support.
  // Review-log entries remain intact as historical data.
  S.deck = S.deck.filter(c => c.kind !== 'cmd' || supported.has(c.id));
  const have = new Set(S.deck.filter(c => c.kind === 'cmd').map(c => c.id));
  let added = 0;
  COMMANDS.forEach(cmd => {
    if (!have.has(cmd.id)){
      S.deck.push({ id: cmd.id, kind:'cmd', due: Date.now(), reps:0 });
      added++;
    }
  });
  if (added || S.deck.length !== before) save();
}
function cmdOf(card){ return COMMANDS.find(c => c.id === card.id); }

function drillOptions(cmd){
  const uniqByIcon = (list) => {
    const seen = new Set([cmd.icon]);
    return list.filter(c => { if (seen.has(c.icon)) return false; seen.add(c.icon); return true; });
  };
  const sameCat = uniqByIcon(COMMANDS.filter(c => c.cat === cmd.cat && c.id !== cmd.id))
    .sort(() => Math.random() - 0.5);
  // Diagram surfaces represent their category literally; do not fill their
  // missing arms/exits with unrelated commands.
  if (cmd.cat === 'dir' || cmd.cat === 'rot'){
    return [cmd, ...sameCat].sort(() => Math.random() - 0.5);
  }
  const others = uniqByIcon(COMMANDS.filter(c => c.cat !== cmd.cat))
    .sort(() => Math.random() - 0.5);
  const picks = sameCat.slice(0, 3);
  while (picks.length < 3 && others.length) picks.push(others.shift());
  return [cmd, ...picks].sort(() => Math.random() - 0.5);
}

  stopDrillTimer();

  const badge = $('dr-timer');

    stopDrillTimer();
    // Treat time-up exactly like a wrong answer, using answerCmd's shared path.
    const rightBtn = document.querySelector('.opt[data-id="' + cmd.id + '"]');

function roundaboutSVG(exits){
  // exits: array of {id, label, x, y} — up to five numbered exits, each
  // placed counterclockwise from the bottom entry road.
  // Ring radius 70. Each exit is a native SVG <g> with a 68×68 viewBox-unit
  // <circle> tap target and a
  // <text> label. Click listeners attached to the groups in renderDrillCard.
  const R = 70, CX = 150, CY = 150;
  const hitR = 34;             // 68×68 viewBox-unit tap targets
  // Five exit roads plus the entry road. The diagonals make exits 1–5
  // geometrically distinct without sharing the 6-o'clock entry arm.
  const roads =
    `<path d="M220 150 L300 150 M199 101 L270 30 M150 80 L150 0 ` +
      `M101 101 L30 30 M80 150 L0 150 M150 220 L150 300" ` +
      `stroke="#535a53" stroke-width="44" fill="none"/>`;
  // Roundabout ring + inner island
  const ring =
    `<circle cx="${CX}" cy="${CY}" r="${R + 10}" fill="#535a53"/>` +
    `<circle cx="${CX}" cy="${CY}" r="${R - 10}" fill="#2c6e3a"/>` +
    `<circle cx="${CX}" cy="${CY}" r="${R - 22}" fill="#3d8a4f"/>`;
  // Circulation arrows (counterclockwise on clock)
  const circ =
    `<path d="M ${CX + 45} ${CY - 45} A 64 64 0 0 0 ${CX - 45} ${CY - 45}" ` +
      `fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity=".55"/>` +
    `<path d="M ${CX + 50} ${CY - 55} L ${CX - 42} ${CY - 52} L ${CX - 35} ${CY - 38} Z" fill="#fff" opacity=".55"/>`;
  // Entry arrow at bottom: below the 6-o'clock road, pointing toward ring
  const entry =
    `<path d="M ${CX} 295 L ${CX - 10} 275 L ${CX + 10} 275 Z" fill="#e8c547"/>` +
    `<path d="M ${CX} 280 L ${CX} 262" stroke="#e8c547" stroke-width="4" stroke-linecap="round"/>`;
  // Exit groups: real SVG, classed so CSS .right/.wrong feedback applies.
  // .opt class kept so answerCmd's querySelectorAll('.opt') reveals still hit.
  const buttons = exits.map(e =>
    `<g class="opt rot-exit" data-id="${e.id}">` +
      `<circle cx="${e.x}" cy="${e.y}" r="${hitR}" class="hit"/>` +
      `<text x="${e.x}" y="${e.y}" class="lbl">${e.label}</text>` +
    `</g>`
  ).join('');
  return `<svg class="rot-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">${roads}${ring}${circ}${entry}${buttons}</svg>`;
}

function junctionSVG(exits){
  // Junction/crossroads for the dir category. Layout: viewBox 300x300, center
  // (150,150). Four arms of road at N/E/W/S ending in tappable <g> groups.
  // Same geometry as roundabout so they match visually side-by-side.
  // exits: [{id, icon, x, y}] — direction/position terminology uses the
  // same natural mapping as the original four-arm surface.
  const CX = 150, CY = 150;
  const roadW = 22;            // road half-width
  const roadL = 110;           // arm length from center edge
  const blockW = roadW * 2;    // 44 — central intersection block
  // Four arms (N/S/E/W) radiating from center intersection
  const roads =
    `<rect x="${CX - roadW}" y="${CY - roadL}" width="${roadW*2}" height="${roadL}" fill="#535a53"/>` +    // North arm
    `<rect x="${CX - roadW}" y="${CY}"         width="${roadW*2}" height="${roadL}" fill="#535a53"/>` +    // South arm
    `<rect x="${CX}"          y="${CY - roadW}" width="${roadL}" height="${roadW*2}" fill="#535a53"/>` +   // East arm
    `<rect x="${CX - roadL}"  y="${CY - roadW}" width="${roadL}" height="${roadW*2}" fill="#535a53"/>`;   // West arm
  // Central intersection block (where roads cross)
  const cross = `<rect x="${CX - roadW}" y="${CY - roadW}" width="${blockW}" height="${blockW}" fill="#535a53"/>`;
  // Dashed center lines on each arm (lane markings) — purely decorative
  const markings =
    `<line x1="${CX}" y1="${CY}" x2="${CX}" y2="${CY - roadL + 10}" stroke="#e8e3c8" stroke-width="2" stroke-dasharray="8 6"/>` +
    `<line x1="${CX}" y1="${CY}" x2="${CX}" y2="${CY + roadL - 10}" stroke="#e8e3c8" stroke-width="2" stroke-dasharray="8 6"/>` +
    `<line x1="${CX}" y1="${CY}" x2="${CX + roadL - 10}" y2="${CY}" stroke="#e8e3c8" stroke-width="2" stroke-dasharray="8 6"/>` +
    `<line x1="${CX}" y1="${CY}" x2="${CX - roadL + 10}" y2="${CY}" stroke="#e8e3c8" stroke-width="2" stroke-dasharray="8 6"/>`;
  // Entry arrow at the bottom: yellow triangle + shaft pointing up toward center
  const entry =
    `<path d="M ${CX - 10} 285 L ${CX + 10} 285 L ${CX} 270 Z" fill="#e8c547"/>` +
    `<path d="M ${CX} 285 L ${CX} 275" stroke="#e8c547" stroke-width="4" stroke-linecap="round"/>`;
  // Tap-target groups for each arm end. .opt kept so answerCmd flow works.
  const buttons = exits.map(e =>
    `<g class="opt dir-exit" data-id="${e.id}">` +
      `<circle cx="${e.x}" cy="${e.y}" r="44" class="hit"/>` +
      `<text x="${e.x}" y="${e.y}" class="lbl">${e.icon}</text>` +
    `</g>`
  ).join('');
  return `<svg class="dir-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">${roads}${cross}${markings}${entry}${buttons}</svg>`;
}

function renderDrillCard(){
  const el = $('drill');
  const card = drillQueue[0];
  const cmd = cmdOf(card);
  const opts = drillOptions(cmd);
  const done = drillSize - drillQueue.length;
  drillLock = false;
  stopDrillTimer();
  // Roundabout branch: replace the 2x2 icon pad with a tappable SVG.
  // Junction (dir) branch: same idea, crossroads with 4 arms.
  let optionsHtml;
  if (cmd.cat === 'rot'){
    const positions = {
      'c-rot1': { x:260, y:150, label:'1ª' },
      'c-rot2': { x:228, y:72,  label:'2ª' },
      'c-rot3': { x:150, y:40,  label:'3ª' },
      'c-rot4': { x:72,  y:72,  label:'4ª' },
      'c-rot5': { x:40,  y:150, label:'5ª' }
    };
    const rotOpts = opts.map(o => ({ id: o.id, label: positions[o.id].label, x: positions[o.id].x, y: positions[o.id].y }));
    optionsHtml = roundaboutSVG(rotOpts);
  } else if (cmd.cat === 'dir'){
    const CX = 150, CY = 150, roadL = 110;
    const d = roadL - 20;
    const positions = {
      'c-volante': { x: CX,     y: CY - d, icon: '⬆️' },
      'c-der':     { x: CX + d, y: CY,     icon: '➡️' },
      'c-izq':     { x: CX - d, y: CY,     icon: '⬅️' },
      'c-sentido': { x: CX,     y: CY + d, icon: '🔄' }
    };
    const dirOpts = opts.map(o => ({ id: o.id, icon: positions[o.id].icon, x: positions[o.id].x, y: positions[o.id].y }));
    optionsHtml = junctionSVG(dirOpts);
  } else {
    optionsHtml = '<div class="opts">' +
      opts.map(o => '<button class="opt" data-id="' + o.id + '">' + o.icon + '</button>').join('') +
    '</div>';
  }
  const timerHtml = drillTimed ? timerBadgeHtml(Math.ceil(DRILL_TIME_MS / 1000)) : '';
  el.innerHTML =
    '<div class="drill-panel">' +
      '<div class="rev-progress">' + Math.min(done + 1, drillSize) + ' / ' + drillSize + timerHtml + '</div>' +
      '<button class="btn-ear" id="dr-say">🔊</button>' +
      '<div class="drill-q">Escucha la orden…</div>' +
      optionsHtml +
      '<div class="drill-reveal" id="dr-reveal"></div>' +
    '</div>';
  drillCardStartedAt = Date.now();
  drillReplayCount = 0;
  $('dr-say').addEventListener('click', () => { drillReplayCount++; speak(cmd.es); });
  el.querySelectorAll('.opt').forEach(b => b.addEventListener('click', () => answerCmd(b, cmd, card)));
  speak(cmd.es);
  if (drillTimed) startDrillTimer(card, cmd);
}

function answerCmd(btn, cmd, card){
  if (drillLock) return;
  drillLock = true;
  stopDrillTimer();
  const right = btn.dataset.id === cmd.id;
  recordCommandAttempt(cmd, card, right ? 3 : 1, btn.dataset.id, false);
  const reveal = $('dr-reveal');
  if (right){
    if (!drillMissed.has(card.id)) drillRight++;   // first-attempt successes only
    btn.classList.add('right');
    SFX.bien();
    reveal.innerHTML = '<div class="es">' + cmd.es + '</div><div class="en">' + cmd.en + '</div>';
    drillQueue.shift();
    setTimeout(nextDrill, 900);
  } else {
    drillMissed.add(card.id);
    btn.classList.add('wrong');
    SFX.otra();
    document.querySelectorAll('.opt').forEach(b => { if (b.dataset.id === cmd.id) b.classList.add('right'); });
    reveal.innerHTML = '<div class="es">' + cmd.es + '</div><div class="en">' + cmd.en + '</div>' +
      '<button class="btn btn-bien" id="dr-next" style="margin-top:10px">Continuar</button>';
    speak(cmd.es);
    drillQueue.push(drillQueue.shift());     // requeue until answered right
    $('dr-next').addEventListener('click', nextDrill);
  }
}

// Shared handler when the timer expires without an answer — mirrors the
// wrong-answer path of answerCmd but locates the right button by data-id.
function answerCmdTimedExpired(rightBtn, cmd, card){
  if (drillLock) return;
  drillLock = true;
  stopDrillTimer();
  recordCommandAttempt(cmd, card, 1, null, true);
  drillMissed.add(card.id);
  if (rightBtn) rightBtn.classList.add('right');
  const reveal = $('dr-reveal');
  SFX.otra();
  reveal.innerHTML =
    '<div class="es">¡Se acabó el tiempo!</div>' +
    '<div class="es" style="margin-top:4px">' + cmd.es + '</div>' +
    '<div class="en">' + cmd.en + '</div>' +
    '<button class="btn btn-bien" id="dr-next" style="margin-top:10px">Continuar</button>';
  speak(cmd.es);
  drillQueue.push(drillQueue.shift());     // requeue
  $('dr-next').addEventListener('click', nextDrill);
}

function nextDrill(){
  if (drillQueue.length){ renderDrillCard(); return; }
  stopDrillTimer();
  // session complete
  let rewardTxt = '';
  if (commandAttemptSchedules(drillMode, drillTimed)){
    S.stars++;
    S.hammers = (S.hammers || 0) + 1;
    save(); refreshHUD();
    rewardTxt = '<p>+1 estrella · +1 🔨</p>';
  }
  showModal(
    '<div class="em">🦺</div><h2>Fin del examen</h2>' +
    '<p>' + drillRight + ' de ' + drillSize + ' a la primera</p>' + rewardTxt +
    '<p class="cooper">🐕 <b>Cooper:</b> ' +
      (drillRight === drillSize ? '¡Apto! Bueno… casi.<br><span class="cen">Pass! Well… almost.</span>'
                                : 'En la calle no hay segunda salida… digo, oportunidad.<br><span class="cen">On the road there are no second chances.</span>') +
    '</p>' +
    '<button class="btn btn-bien" onclick="closeModal()">Vale</button>'
  );
  drillMode = null; drillSize = 0; drillRight = 0;
  renderDrill();
}

/* ============================================================
   PROGRESO — stats & review log
   ============================================================ */
function calcStreak(){
  const days = new Set(S.log.map(e => new Date(e.t).toDateString()));
  let streak = 0;
  const d = new Date();
  if (!days.has(d.toDateString())) d.setDate(d.getDate() - 1); // today still pending
  while (days.has(d.toDateString())){ streak++; d.setDate(d.getDate() - 1); }
  return streak;
}
function renderStats(){
  const area = $('stats-area');
  const now = Date.now();
  const objs = S.deck.filter(c => c.kind === 'obj').length;
  const phrs = S.deck.filter(c => c.kind === 'phr').length;
  const dueNow = dueCards().length;
  const due24 = S.deck.filter(c => c.due <= now + DAY).length;
  const streak = calcStreak();
  const recent = S.log.filter(e => e.scheduled !== false).slice(-100);
  const acc = recent.length ? Math.round(100 * recent.filter(e => e.g === 3).length / recent.length) : null;
  const mastered = S.deck.filter(c => (c.S || 0) >= 21).length;
  const cmds = S.deck.filter(c => c.kind === 'cmd').length;
  const cmdLog = S.log.filter(e => e.k === 'cmd' && e.scheduled !== false).slice(-50);
  const cmdAcc = cmdLog.length ? Math.round(100 * cmdLog.filter(e => e.g === 3).length / cmdLog.length) : null;

  const buckets = [
    { lab:'aprendiendo (<1 d)',  test: st => st < 1 },
    { lab:'joven (1–7 d)',       test: st => st >= 1 && st < 7 },
    { lab:'madura (7–21 d)',     test: st => st >= 7 && st < 21 },
    { lab:'dominada (21+ d)',    test: st => st >= 21 },
  ];
  const counts = buckets.map(b => S.deck.filter(c => b.test(c.S || 0.01)).length);
  const maxC = Math.max(1, ...counts);
  const bars = buckets.map((b, i) =>
    '<div class="sbar"><span class="lab">' + b.lab + '</span>' +
    '<span class="bar"><i style="width:' + Math.round(100 * counts[i] / maxC) + '%"></i></span>' +
    '<span class="val">' + counts[i] + '</span></div>').join('');

  area.innerHTML =
    '<div class="stat-grid">' +
      '<div class="stat"><div class="n">' + streak + '</div><div class="l">🔥 racha (días)</div></div>' +
      '<div class="stat"><div class="n">' + (objs + phrs) + '</div><div class="l">palabras y frases</div></div>' +
      '<div class="stat"><div class="n">' + dueNow + '</div><div class="l">para repasar ahora</div></div>' +
      '<div class="stat"><div class="n">' + due24 + '</div><div class="l">en las próximas 24 h</div></div>' +
      '<div class="stat"><div class="n">' + (acc === null ? '—' : acc + '%') + '</div><div class="l">aciertos recientes</div></div>' +
      '<div class="stat"><div class="n">' + S.log.length + '</div><div class="l">repasos totales</div></div>' +
      (cmds ? '<div class="stat"><div class="n">' + cmds + '</div><div class="l">🚦 órdenes del examen</div></div>' +
              '<div class="stat"><div class="n">' + (cmdAcc === null ? '—' : cmdAcc + '%') + '</div><div class="l">aciertos al volante</div></div>' : '') +
    '</div>' +
    '<div class="stat-panel"><h3>Memoria por estabilidad</h3>' + bars +
      '<p style="font-size:12px; color:#9aa49c; font-weight:700; margin:10px 0 0">' +
      mastered + (mastered === 1 ? ' tarjeta dominada' : ' tarjetas dominadas') +
      ' · ' + objs + ' objetos · ' + phrs + ' frases</p></div>' +
    (streak >= 3 ? '<p class="cooper">🐕 <b>Cooper:</b> ¡' + streak + ' días seguidos! Eres más constante que el orbayu.<br><span class="cen">' + streak + ' days in a row! More constant than the drizzle.</span></p>' : '');
}

/* ============================================================

$('btn-data').addEventListener('click', () => {
  showModal(
    '<div class="em">💾</div><h2>Copia de seguridad</h2>' +
    '<p>Todo tu progreso (casa, tarjetas, historial de repasos) en un solo texto. Guárdalo donde quieras; pégalo aquí para restaurar.</p>' +
    '<textarea id="bk-text" style="width:100%; height:110px; font-size:11px; border-radius:10px; border:1px solid var(--linea); padding:8px; font-family:monospace"></textarea>' +
    '<div style="margin-top:10px">' +
      '<button class="btn btn-bien" id="bk-export">Exportar</button> ' +
      '<button class="btn btn-otra" id="bk-import">Restaurar</button> ' +
      '<button class="btn btn-audio" onclick="closeModal()">Cerrar</button>' +
    '</div>'
  );
  $('bk-export').addEventListener('click', () => {
    const data = JSON.stringify(S);
    $('bk-text').value = data;
    $('bk-text').select();
    try { navigator.clipboard.writeText(data); } catch(e){}
    $('bk-export').textContent = 'Copiado ✓';
  });
  $('bk-import').addEventListener('click', () => {
    try {
      const parsed = JSON.parse($('bk-text').value.trim());
      if (!parsed || !Array.isArray(parsed.deck) || typeof parsed.stars !== 'number')
        throw new Error('formato');
      localStorage.setItem('piso-asturiano', JSON.stringify(parsed));
      location.reload();          // reload runs loadState() and all backfills
    } catch(e){
      $('bk-import').textContent = 'Texto no válido';
      setTimeout(() => $('bk-import').textContent = 'Restaurar', 1600);
    }
  });
});

    S = structuredClone(DEFAULT_STATE);
